services:
  app:
    build:
      context: .
      args:
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY}
        VITE_APPLE_SHORTCUT_URL: ${VITE_APPLE_SHORTCUT_URL:-}
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    networks:
      - web

networks:
  web:
    external: true
