# Categories and subcategories seeded on `npm run seed`.
# Each `id` is foreign-keyed by expenses — do NOT rename ids after first seed
# unless you also rewrite the data. Renaming `name`, changing `color`, or
# adding new entries is safe.
# After seeding, edits propagate through the sync protocol — clients fetch
# the full list on every sync.

