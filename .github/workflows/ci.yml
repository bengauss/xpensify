name: CI

on:
  push:
    branches: [master]
  pull_request:

# Least privilege: CI only reads the repo and runs tests (public repo).
permissions:
  contents: read

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm ci
        working-directory: server
      - run: npm run build
        working-directory: server
      - run: npm test
        working-directory: server

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      # client `tsc` resolves @server/* type imports, so server deps must be
      # installed in this job too (mirrors the Dockerfile's client-build stage).
      - run: npm ci
        working-directory: server
      - run: npm ci
        working-directory: client
      - run: npm run build
        working-directory: client
      - run: npm test
        working-directory: client
