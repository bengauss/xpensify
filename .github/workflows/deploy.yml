# Builds the image in CI, pushes to GHCR, then SSHes into the VPS to pull + restart.
# Required repo secrets:    SSH_PRIVATE_KEY, SSH_HOST, SSH_USER, DEPLOY_PATH  (SSH_PORT optional)
# Required repo variables:  VITE_VAPID_PUBLIC_KEY (public; baked into the client bundle)
#                           VITE_APPLE_SHORTCUT_URL (optional; baked in if set)
name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          # VITE_* are build-time only (baked into the client bundle) and public.
          build-args: |
            VITE_VAPID_PUBLIC_KEY=${{ vars.VITE_VAPID_PUBLIC_KEY }}
            VITE_APPLE_SHORTCUT_URL=${{ vars.VITE_APPLE_SHORTCUT_URL }}
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT:-22}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          PORT="${SSH_PORT:-22}"
          scp -i ~/.ssh/deploy_key -P "$PORT" docker-compose.prod.yml \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/docker-compose.prod.yml"
          ssh -i ~/.ssh/deploy_key -p "$PORT" "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' && \
             echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GH_ACTOR' --password-stdin && \
             IMAGE_TAG='$IMAGE_TAG' docker compose -f docker-compose.prod.yml pull && \
             IMAGE_TAG='$IMAGE_TAG' docker compose -f docker-compose.prod.yml up -d && \
             docker image prune -f && \
             docker logout ghcr.io"
